<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>教會與牧者查詢系統</title>
    <style>
        /* 基本樣式設定 */
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --primary-color: #007aff;
            --text-color: #1c1c1e;
            --secondary-text: #8e8e93;
            --border-radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 卡片容器 (響應式最大寬度調整) */
        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px; /* 放寬最大限制以容納左右排列 */
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--text-color);
        }

        /* 響應式網格佈局 (RWD 核心) */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr; /* 預設為手機版：單欄上下排列 */
            gap: 20px;
        }

        /* 當螢幕寬度大於 768px (平板/電腦) 時，切換為雙欄左右排列 */
        @media (min-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 區塊樣式 */
        .section {
            background-color: var(--bg-color);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
        }

        /* 輔助連結 */
        .help-link {
            display: block;
            text-align: right;
            font-size: 13px;
            color: var(--secondary-text);
            text-decoration: none;
            margin-bottom: 15px;
        }

        .help-link a {
            color: var(--primary-color);
            text-decoration: none;
        }

        /* 輸入框與按鈕 */
        .input-group {
            margin-top: auto; /* 讓輸入框和按鈕對齊底部 */
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #d1d1d6;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #005bb5;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>教會與牧者查詢系統</h2>

        <div class="grid-layout">
            
            <div class="section">
                <div>
                    <div class="section-title">👤 牧者異動查詢</div>
                    <div class="help-link">
                        不知道代號？<a href="https://www.pct.org.tw/pastor.aspx" target="_blank">前往尋找牧者編號</a>
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="pastor-id" placeholder="請輸入牧者代號 (如數字)">
                    <button onclick="searchPastor()">查詢牧者</button>
                </div>
            </div>

            <div class="section">
                <div>
                    <div class="section-title">⛪ 教會歷任查詢</div>
                    <div class="help-link">
                        不知道代號？<a href="https://www.pct.org.tw/church.aspx" target="_blank">前往尋找教會編號</a>
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" id="church-id" placeholder="請輸入教會代號 (如文字)">
                    <button onclick="searchChurch()">查詢教會</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 牧者查詢邏輯
        function searchPastor() {
            const id = document.getElementById('pastor-id').value.trim();
            if (!id) {
                alert('請先輸入牧者代號！');
                return;
            }
            // 組合網址
            const url = `https://acts.pct.org.tw/DataSearch/Pastor.aspx?strPAppiont=${encodeURIComponent(id)}`;
            // 另開新分頁開啟
            window.open(url, '_blank');
        }

        // 教會查詢邏輯
        function searchChurch() {
            const id = document.getElementById('church-id').value.trim();
            if (!id) {
                alert('請先輸入教會代號！');
                return;
            }
            // 組合網址
            const url = `https://acts.pct.org.tw/DataSearch/Pastor.aspx?strHistoryOrgNo=${encodeURIComponent(id)}`;
            // 另開新分頁開啟
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
